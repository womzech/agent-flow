services:
  agent-flow:
    build: .
    image: agent-flow:0.5
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      AGENTFLOW_DB: /app/data/agent-flow.db
      AGENTFLOW_BACKUP_DIR: /app/data/backups
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
