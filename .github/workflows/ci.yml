name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      matrix:
        node: ["18.x", "20.x"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (Node 20 only)
        if: matrix.node == '20.x'
        env:
          AGENTFORGE_PASSWORD: ci-test-password
          AGENTFORGE_BUILD_SHA: ${{ github.sha }}
        run: npm run build

      - name: Seed smoke test (Node 20 only)
        if: matrix.node == '20.x'
        run: npm run seed
